# DEXI - Production Nginx Configuration
# HTTP reverse proxy + WebSocket + Rate limiting

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api_order:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_write:10m rate=20r/s;

    upstream matching_engine {
        server matching-engine:8081;
        keepalive 32;
    }

    upstream go_backend {
        server backend:8080;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # HTTP server (no SSL for now — add later with certbot)
    server {
        listen 80;
        server_name dexi.fun *.dexi.fun 23.27.201.207;

        # ============================================================
        # Security Headers
        # ============================================================
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ============================================================
        # WebSocket - Matching Engine (public + private)
        # ============================================================
        location /ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ============================================================
        # API - Order Submit (strict rate limit: 5 req/s)
        # ============================================================
        location = /api/order/submit {
            limit_req zone=api_order burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # API - Matching Engine endpoints
        # ============================================================
        location ~ ^/api/(wallet|order|position|balance|funding|price|admin|referral|v1/relay|v2/withdraw|user|orderbook|kline|trades|market|ticker) {
            limit_req zone=api_write burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # API - General catch-all for /api/
        # ============================================================
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # Health endpoint
        # ============================================================
        location = /health {
            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
        }

        # ============================================================
        # Go Backend API (auth, history, etc.)
        # ============================================================
        location /v1/ {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # Frontend (Next.js)
        # ============================================================
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Next.js HMR WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================================
        # Error pages
        # ============================================================
        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":"Too many requests","retryAfter":1}';
        }

        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;
    }
}
