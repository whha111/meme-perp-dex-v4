# Meme Perp DEX - Production Nginx Configuration
# TLS 1.2/1.3 + WebSocket proxy + Rate limiting + Security headers

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_order:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=20r/s;

upstream matching_engine {
    server matching-engine:8081;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # ============================================================
    # TLS Configuration
    # ============================================================
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ============================================================
    # Security Headers
    # ============================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # WebSocket - Matching Engine
    # ============================================================
    location /ws {
        proxy_pass http://matching_engine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ============================================================
    # API - Order Submit (strict rate limit: 5 req/s)
    # ============================================================
    location = /api/order/submit {
        limit_req zone=api_order burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://matching_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # API - Write endpoints (moderate rate limit: 20 req/s)
    # ============================================================
    location ~ ^/api/(wallet|order|position|balance|funding|price|admin|referral|v1/relay|v2/withdraw) {
        limit_req zone=api_write burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://matching_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # API - Read endpoints (general rate limit: 100 req/s)
    # ============================================================
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://matching_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # Health & Metrics (no rate limit — monitoring only)
    # ============================================================
    location = /health {
        proxy_pass http://matching_engine;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://matching_engine;
        proxy_set_header Host $host;
        # Optional: restrict to internal IPs
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ============================================================
    # Frontend (Next.js)
    # ============================================================
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket (dev only)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================================
    # Error pages
    # ============================================================
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Too many requests","retryAfter":1}';
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
