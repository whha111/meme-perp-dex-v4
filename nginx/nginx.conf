# DEXI - Production Nginx Configuration
# HTTP reverse proxy + WebSocket + Rate limiting

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api_order:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_write:10m rate=20r/s;

    upstream matching_engine {
        server matching-engine:8081;
        keepalive 32;
    }

    upstream go_backend {
        server backend:8080;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name dexi.fun;
        return 301 https://$host$request_uri;
    }

    # HTTP fallback for IP access
    server {
        listen 80;
        server_name 23.27.201.207;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location /ws { proxy_pass http://matching_engine; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400s; }
        location ~ ^/api/(upload|upload-json|bnb-price)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/ { proxy_pass http://matching_engine; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /v3/ { proxy_pass http://matching_engine; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location = /health { proxy_pass http://matching_engine; }
        location /v1/ { proxy_pass http://go_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name dexi.fun;

        ssl_certificate /etc/letsencrypt/live/dexi.fun/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dexi.fun/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ============================================================
        # Security Headers
        # ============================================================
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ============================================================
        # WebSocket - Matching Engine
        # ============================================================
        location /ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ============================================================
        # API - Order Submit (strict rate limit: 5 req/s)
        # ============================================================
        location = /api/order/submit {
            limit_req zone=api_order burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # API - Next.js route handlers
        # ============================================================
        location ~ ^/api/(upload|upload-json|bnb-price)$ {
            limit_req zone=api_general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # API - Matching Engine endpoints
        # ============================================================
        location ~ ^/api/(wallet|order|position|balance|funding|price|admin|referral|v1/relay|v2/withdraw|user|orderbook|kline|trades|market|ticker) {
            limit_req zone=api_write burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # API - General catch-all for /api/
        # ============================================================
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # dYdX v3-style compatibility API
        # ============================================================
        location /v3/ {
            limit_req zone=api_general burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # Health endpoint
        # ============================================================
        location = /health {
            proxy_pass http://matching_engine;
            proxy_set_header Host $host;
        }

        # ============================================================
        # Go Backend API
        # ============================================================
        location /v1/ {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # Frontend (Next.js)
        # ============================================================
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================================
        # Error pages
        # ============================================================
        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":"Too many requests","retryAfter":1}';
        }

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;
    }
}
