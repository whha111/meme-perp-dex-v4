# Production Configuration — BSC Testnet Docker Deployment
# Loaded when APP_ENV=production (merges on top of config.yaml)
#
# Required environment variables:
# - MEMEPERP_DATABASE_PASSWORD
# - MEMEPERP_REDIS_PASSWORD
# - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY
# - MEMEPERP_JWT_SECRET
# - MEMEPERP_BLOCKCHAIN_RPC_URL

server:
  addr: ":8080"
  mode: "release"
  read_timeout: 30s
  write_timeout: 30s

database:
  host: "${MEMEPERP_DATABASE_HOST:-postgres}"
  port: 5432
  user: "${MEMEPERP_DATABASE_USER:-memeperp}"
  password: "${MEMEPERP_DATABASE_PASSWORD}"
  dbname: "${MEMEPERP_DATABASE_DBNAME:-memeperp}"
  sslmode: "disable"  # Docker-internal PostgreSQL, no SSL needed
  max_idle_conns: 20
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "${MEMEPERP_REDIS_ADDR:-redis:6379}"
  password: "${MEMEPERP_REDIS_PASSWORD}"
  db: 0
  pool_size: 20

blockchain:
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL}"
  chain_id: "${MEMEPERP_BLOCKCHAIN_CHAIN_ID:-97}"

  router_address: "${MEMEPERP_ROUTER_ADDRESS}"
  vault_address: "${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS}"
  amm_address: "${MEMEPERP_AMM_ADDRESS}"
  position_address: "${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS}"
  liquidation_address: "${MEMEPERP_LIQUIDATION_ADDRESS}"
  funding_rate_address: "${MEMEPERP_FUNDING_RATE_ADDRESS}"
  lending_pool_address: "${MEMEPERP_LENDING_POOL_ADDRESS}"
  price_feed_address: "${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS}"
  risk_manager_address: "${MEMEPERP_RISK_MANAGER_ADDRESS}"

  settlement_address: "${MEMEPERP_SETTLEMENT_ADDRESS}"
  settlement_v2_address: "${MEMEPERP_SETTLEMENT_V2_ADDRESS}"
  insurance_fund_address: "${MEMEPERP_INSURANCE_FUND_ADDRESS}"
  contract_registry_address: "${MEMEPERP_CONTRACT_REGISTRY_ADDRESS}"
  perp_vault_address: "${MEMEPERP_PERP_VAULT_ADDRESS}"

  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  start_block: 0
  confirm_blocks: 3
  poll_interval: 3s

matching_engine:
  url: "${MEMEPERP_MATCHING_ENGINE_URL:-http://matching-engine:8081}"

jwt:
  secret: "${MEMEPERP_JWT_SECRET}"
  expiration: 24h

rate_limit:
  public_limit: 1200
  private_limit: 600
  order_limit: 300

security:
  allowed_origins:
    - "http://dexi.fun"
    - "https://dexi.fun"
    - "http://23.27.201.207"
    - "http://23.27.201.207:3000"
  trusted_proxies:
    - "127.0.0.1"
    - "172.16.0.0/12"

log:
  level: "info"
  format: "json"
  output: "stdout"
