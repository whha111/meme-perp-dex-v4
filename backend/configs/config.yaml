server:
  addr: ":8080"
  mode: "debug"  # debug, release
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "memeperp"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  # AUDIT-FIX DP-C03: Redis password MUST be set via env var
  password: "${MEMEPERP_REDIS_PASSWORD}"
  db: 0
  pool_size: 10

blockchain:
  # BSC Testnet — P0-1: RPC URL must come from env in production
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545/}"
  chain_id: 97

  # Contract Addresses (BSC Testnet)
  router_address: "${MEMEPERP_ROUTER_ADDRESS:-0xF15197BA411b578dafC7936C241bE9DD725c22BE}"
  vault_address: "${MEMEPERP_VAULT_ADDRESS:-0xACE7014F60eF9c367E7fA5Dd80601A9945E6F4d1}"
  amm_address: "${MEMEPERP_AMM_ADDRESS:-0x2c23046DC1595754528a10b8340F2AD8fdE05112}"
  position_address: "${MEMEPERP_POSITION_ADDRESS:-0x04C515CcFac80BFFF27E0c5A9113e515171057b6}"
  liquidation_address: "${MEMEPERP_LIQUIDATION_ADDRESS:-0x322AeeD67C12c10684B134e1727866425dc75F1c}"
  funding_rate_address: "${MEMEPERP_FUNDING_RATE_ADDRESS:-0x0a513bf3DE079Bf2439A5884583712bD014487aa}"
  lending_pool_address: "${MEMEPERP_LENDING_POOL_ADDRESS:-0x98a7665301C0dB32ceff957e1A2c505dF8384CA4}"
  price_feed_address: "${MEMEPERP_PRICE_FEED_ADDRESS:-0xe2b22673fFBeB7A2a4617125E885C12EC072ee48}"
  risk_manager_address: "${MEMEPERP_RISK_MANAGER_ADDRESS:-0xd4fbB0f140d8909e73e3D91C897EBe66f01B15F9}"
  presale_address: "0x0000000000000000000000000000000000000000"
  meme_token_address: "${MEMEPERP_MEME_TOKEN_ADDRESS:-0xB3D475Bf9c7427Fd1dC6494227803fE163320d69}"

  # Settlement contracts (Deployed 2026-03-03)
  settlement_address: "${MEMEPERP_SETTLEMENT_ADDRESS:-0x63df8d6acF3f99Ae59Bee6184A5EB6beA8663eb7}"
  settlement_v2_address: "${MEMEPERP_SETTLEMENT_V2_ADDRESS:-0x7fF9d60aE49F14bB604FeF1961910D7931067873}"
  insurance_fund_address: "${MEMEPERP_INSURANCE_FUND_ADDRESS:-0x162CEbAe2013545D191360d13ceA5083E6fcE1a7}"
  contract_registry_address: "${MEMEPERP_CONTRACT_REGISTRY_ADDRESS:-0x6956c982aec9Ad08040b91417a313003879d0f48}"
  perp_vault_address: "${MEMEPERP_PERP_VAULT_ADDRESS:-0x7F98ed779c3352f39b041C57d5B2C73F84dcAA75}"

  # P0-1: Private key MUST come from env — NEVER hardcode in config files
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings
  start_block: 0
  confirm_blocks: 3
  poll_interval: 3s

matching_engine:
  # TypeScript matching engine HTTP API (for Keeper position sync)
  url: "${MEMEPERP_MATCHING_ENGINE_URL:-http://localhost:8081}"

jwt:
  # AUDIT-FIX GO-C01: MUST set JWT_SECRET env var. No fallback — empty string forces startup failure
  secret: "${JWT_SECRET}"
  expiration: 24h

rate_limit:
  public_limit: 1200   # per minute
  private_limit: 600   # per minute
  order_limit: 300     # per minute

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  trusted_proxies: []

log:
  level: "debug"   # debug, info, warn, error
  format: "json"   # json, console
  output: "stdout" # stdout, or file path
