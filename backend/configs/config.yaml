server:
  addr: ":8080"
  mode: "debug"  # debug, release
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "memeperp"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10

blockchain:
  # Base Sepolia Testnet — P0-1: RPC URL must come from env in production
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}"
  chain_id: 84532

  # Contract Addresses (Base Sepolia - Redeployed 2026-02-28)
  router_address: "${MEMEPERP_ROUTER_ADDRESS:-0xF15197BA411b578dafC7936C241bE9DD725c22BE}"
  vault_address: "${MEMEPERP_VAULT_ADDRESS:-0xcc4Fa8Df0686824F92d392Cb650057EA7D2EF46E}"
  amm_address: "${MEMEPERP_AMM_ADDRESS:-0x2c23046DC1595754528a10b8340F2AD8fdE05112}"
  position_address: "${MEMEPERP_POSITION_ADDRESS:-0x7611a924622B5f6bc4c2ECAAdB6DE078E741AcF6}"
  liquidation_address: "${MEMEPERP_LIQUIDATION_ADDRESS:-0x6Fb6325094B24AE5f458f7a34C63BE30Da9aAECA}"
  funding_rate_address: "${MEMEPERP_FUNDING_RATE_ADDRESS:-0xD6DD3947F8d80A031b69eBd825Be2384E787dC46}"
  lending_pool_address: "${MEMEPERP_LENDING_POOL_ADDRESS:-0x98a7665301C0dB32ceff957e1A2c505dF8384CA4}"
  price_feed_address: "${MEMEPERP_PRICE_FEED_ADDRESS:-0xfB347BC4Cc61C7FdCD862ED212A0e3866d205112}"
  risk_manager_address: "${MEMEPERP_RISK_MANAGER_ADDRESS:-0x7fC37B0bD2c8c2646C9087A21e33e2A404AD7A39}"
  presale_address: "0x0000000000000000000000000000000000000000"
  meme_token_address: "${MEMEPERP_MEME_TOKEN_ADDRESS:-0xB3D475Bf9c7427Fd1dC6494227803fE163320d69}"

  # Settlement contracts (Redeployed 2026-02-28)
  settlement_address: "${MEMEPERP_SETTLEMENT_ADDRESS:-0x1660b3571fB04f16F70aea40ac0E908607061DBE}"
  settlement_v2_address: "${MEMEPERP_SETTLEMENT_V2_ADDRESS:-0x733EccCf612F70621c772D63334Cf5606d7a7C75}"
  insurance_fund_address: "${MEMEPERP_INSURANCE_FUND_ADDRESS:-0x93F63c2EEc4bF77FF301Cd14Ef4A392E58e33C69}"
  contract_registry_address: "${MEMEPERP_CONTRACT_REGISTRY_ADDRESS:-0x218A135F119AcAf00141b979cdFEf432f563437F}"
  perp_vault_address: "${MEMEPERP_PERP_VAULT_ADDRESS:-0x586FB78b8dB39d8D89C1Fd2Aa0c756C828e5251F}"

  # P0-1: Private key MUST come from env — NEVER hardcode in config files
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings
  start_block: 0
  confirm_blocks: 3
  poll_interval: 3s

matching_engine:
  # TypeScript matching engine HTTP API (for Keeper position sync)
  url: "${MEMEPERP_MATCHING_ENGINE_URL:-http://localhost:8081}"

jwt:
  # AUDIT-FIX GO-C01: MUST set JWT_SECRET env var. No fallback — empty string forces startup failure
  secret: "${JWT_SECRET}"
  expiration: 24h

rate_limit:
  public_limit: 1200   # per minute
  private_limit: 600   # per minute
  order_limit: 300     # per minute

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  trusted_proxies: []

log:
  level: "debug"   # debug, info, warn, error
  format: "json"   # json, console
  output: "stdout" # stdout, or file path
