server:
  addr: ":8080"
  mode: "debug"  # debug, release
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "memeperp"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  # AUDIT-FIX DP-C03: Redis password MUST be set via env var
  password: "${MEMEPERP_REDIS_PASSWORD}"
  db: 0
  pool_size: 10

blockchain:
  # All values MUST come from env — no hardcoded addresses or chain config
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL}"
  chain_id: "${MEMEPERP_BLOCKCHAIN_CHAIN_ID}"

  # Contract Addresses — all from env vars
  router_address: "${MEMEPERP_ROUTER_ADDRESS}"
  vault_address: "${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS}"
  amm_address: "${MEMEPERP_AMM_ADDRESS}"
  position_address: "${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS}"
  liquidation_address: "${MEMEPERP_LIQUIDATION_ADDRESS}"
  funding_rate_address: "${MEMEPERP_FUNDING_RATE_ADDRESS}"
  lending_pool_address: "${MEMEPERP_LENDING_POOL_ADDRESS}"
  price_feed_address: "${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS}"
  risk_manager_address: "${MEMEPERP_RISK_MANAGER_ADDRESS}"
  presale_address: "${MEMEPERP_PRESALE_ADDRESS:-0x0000000000000000000000000000000000000000}"
  meme_token_address: "${MEMEPERP_MEME_TOKEN_ADDRESS}"

  # Settlement contracts
  settlement_address: "${MEMEPERP_SETTLEMENT_ADDRESS}"
  settlement_v2_address: "${MEMEPERP_SETTLEMENT_V2_ADDRESS}"
  insurance_fund_address: "${MEMEPERP_INSURANCE_FUND_ADDRESS}"
  contract_registry_address: "${MEMEPERP_CONTRACT_REGISTRY_ADDRESS}"
  perp_vault_address: "${MEMEPERP_PERP_VAULT_ADDRESS}"

  # P0-1: Private key MUST come from env — NEVER hardcode in config files
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings
  start_block: 0
  confirm_blocks: 3
  poll_interval: 3s

matching_engine:
  # TypeScript matching engine HTTP API (for Keeper position sync)
  url: "${MEMEPERP_MATCHING_ENGINE_URL:-http://localhost:8081}"

jwt:
  # AUDIT-FIX GO-C01: MUST set JWT_SECRET env var. No fallback — empty string forces startup failure
  secret: "${JWT_SECRET}"
  expiration: 24h

rate_limit:
  public_limit: 1200   # per minute
  private_limit: 600   # per minute
  order_limit: 300     # per minute

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  trusted_proxies: []

log:
  level: "debug"   # debug, info, warn, error
  format: "json"   # json, console
  output: "stdout" # stdout, or file path
