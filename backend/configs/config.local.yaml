# Local Development Configuration
# This file is automatically loaded when APP_ENV=local
# Override any settings from config.yaml here

server:
  addr: ":8080"
  mode: "debug"
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${MEMEPERP_DATABASE_PASSWORD:-postgres}"  # Default for local only
  dbname: "memeperp"
  sslmode: "disable"  # OK for local development
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  password: "${MEMEPERP_REDIS_PASSWORD:}"  # Empty password OK for local
  db: 0
  pool_size: 10

blockchain:
  # All values from env — no hardcoded addresses
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL}"
  chain_id: ${MEMEPERP_BLOCKCHAIN_CHAIN_ID}

  # Contract addresses — all from env vars (set in .env)
  position_address: "${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS}"
  router_address: "${MEMEPERP_ROUTER_ADDRESS}"
  vault_address: "${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS}"
  amm_address: "${MEMEPERP_AMM_ADDRESS}"
  liquidation_address: "${MEMEPERP_LIQUIDATION_ADDRESS}"
  funding_rate_address: "${MEMEPERP_FUNDING_RATE_ADDRESS}"
  lending_pool_address: "${MEMEPERP_LENDING_POOL_ADDRESS}"
  price_feed_address: "${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS}"
  token_factory_address: "${MEMEPERP_TOKEN_FACTORY_ADDRESS}"
  settlement_address: "${MEMEPERP_SETTLEMENT_ADDRESS}"
  settlement_v2_address: "${MEMEPERP_SETTLEMENT_V2_ADDRESS}"
  perp_vault_address: "${MEMEPERP_PERP_VAULT_ADDRESS}"
  risk_manager_address: "${MEMEPERP_RISK_MANAGER_ADDRESS}"
  insurance_fund_address: "${MEMEPERP_INSURANCE_FUND_ADDRESS}"
  contract_registry_address: "${MEMEPERP_CONTRACT_REGISTRY_ADDRESS}"

  # P0-1: Private key MUST come from env — set MEMEPERP_BLOCKCHAIN_PRIVATE_KEY in .env.local
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings (local dev: faster polling)
  start_block: 0
  confirm_blocks: 1
  poll_interval: 1s

matching_engine:
  # Matching Engine (TypeScript service) URL — the ONLY field MatchingEngineConfig reads
  url: "http://localhost:8081"

jwt:
  secret: "dev-jwt-secret-at-least-32-characters-long-for-testing"
  expiration: 24h

rate_limit:
  public_limit: 10000
  private_limit: 5000
  order_limit: 2000

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://127.0.0.1:3000"
  trusted_proxies: []

log:
  level: "debug"
  format: "console"
  output: "stdout"
