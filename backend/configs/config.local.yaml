# Local Development Configuration
# This file is automatically loaded when APP_ENV=local
# Override any settings from config.yaml here

server:
  addr: ":8080"
  mode: "debug"
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${MEMEPERP_DATABASE_PASSWORD:-postgres}"  # Default for local only
  dbname: "memeperp"
  sslmode: "disable"  # OK for local development
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  password: "${MEMEPERP_REDIS_PASSWORD:}"  # Empty password OK for local
  db: 0
  pool_size: 10

blockchain:
  # BSC Mainnet — P0-1: Use public RPC, API key via env only
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://bsc-dataseed.binance.org/}"
  chain_id: 56  # BSC Mainnet

  # Contract addresses (Deployed 2026-03-03)
  # AUDIT-FIX M-18: All contract addresses belong here, NOT under matching_engine
  position_address: "0x04C515CcFac80BFFF27E0c5A9113e515171057b6"
  router_address: "0xF15197BA411b578dafC7936C241bE9DD725c22BE"
  vault_address: "0xACE7014F60eF9c367E7fA5Dd80601A9945E6F4d1"
  amm_address: "0x2c23046DC1595754528a10b8340F2AD8fdE05112"
  liquidation_address: "0x322AeeD67C12c10684B134e1727866425dc75F1c"
  funding_rate_address: "0x0a513bf3DE079Bf2439A5884583712bD014487aa"
  lending_pool_address: "0x98a7665301C0dB32ceff957e1A2c505dF8384CA4"
  price_feed_address: "0xe2b22673fFBeB7A2a4617125E885C12EC072ee48"

  # P0-1: Private key MUST come from env — set MEMEPERP_BLOCKCHAIN_PRIVATE_KEY in .env.local
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings (local dev: faster polling)
  start_block: 0
  confirm_blocks: 1
  poll_interval: 1s

matching_engine:
  # Matching Engine (TypeScript service) URL — the ONLY field MatchingEngineConfig reads
  url: "http://localhost:8081"

jwt:
  secret: "dev-jwt-secret-at-least-32-characters-long-for-testing"
  expiration: 24h

rate_limit:
  public_limit: 10000
  private_limit: 5000
  order_limit: 2000

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://127.0.0.1:3000"
  trusted_proxies: []

log:
  level: "debug"
  format: "console"
  output: "stdout"
