services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: memeperp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MEMEPERP_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${MEMEPERP_DATABASE_PASSWORD:?MEMEPERP_DATABASE_PASSWORD is required}
      POSTGRES_DB: ${MEMEPERP_DATABASE_DBNAME:-memeperp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEMEPERP_DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache — AUDIT-FIX DP-C03: require password authentication
  redis:
    image: redis:7-alpine
    container_name: memeperp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${MEMEPERP_REDIS_PASSWORD:?MEMEPERP_REDIS_PASSWORD is required} --appendonly yes
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MEMEPERP_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Matching Engine (TypeScript Service)
  matching-engine:
    build:
      context: ./backend/src
      dockerfile: matching/Dockerfile
    container_name: memeperp-matching-engine
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}
      - MATCHER_PRIVATE_KEY=${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY:?MEMEPERP_BLOCKCHAIN_PRIVATE_KEY is required}
      - SETTLEMENT_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
      - TOKEN_FACTORY_ADDRESS=${MEMEPERP_TOKEN_FACTORY_ADDRESS:-0x757eF02C2233b8cE2161EE65Fb7D626776b8CB73}
      - PRICE_FEED_ADDRESS=${MEMEPERP_PRICE_FEED_ADDRESS:-0xfB347BC4Cc61C7FdCD862ED212A0e3866d205112}
      - SETTLEMENT_V2_ADDRESS=${MEMEPERP_SETTLEMENT_V2_ADDRESS:-0x733EccCf612F70621c772D63334Cf5606d7a7C75}
      - PERP_VAULT_ADDRESS=${MEMEPERP_PERP_VAULT_ADDRESS:-0x586FB78b8dB39d8D89C1Fd2Aa0c756C828e5251F}
      - COLLATERAL_TOKEN_ADDRESS=0x4200000000000000000000000000000000000006
      - INSURANCE_FUND_ADDRESS=${MEMEPERP_INSURANCE_FUND_ADDRESS:-0x93F63c2EEc4bF77FF301Cd14Ef4A392E58e33C69}
      - VAULT_ADDRESS=${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS:-0xcc4Fa8Df0686824F92d392Cb650057EA7D2EF46E}
      - POSITION_MANAGER_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:-0x7611a924622B5f6bc4c2ECAAdB6DE078E741AcF6}
      - FUNDING_RATE_ADDRESS=${MEMEPERP_FUNDING_RATE_ADDRESS:-0xD6DD3947F8d80A031b69eBd825Be2384E787dC46}
      - LIQUIDATION_ADDRESS=${MEMEPERP_LIQUIDATION_ADDRESS:-0x6Fb6325094B24AE5f458f7a34C63BE30Da9aAECA}
      - LENDING_POOL_ADDRESS=${MEMEPERP_LENDING_POOL_ADDRESS:-0x98a7665301C0dB32ceff957e1A2c505dF8384CA4}
      - BATCH_INTERVAL_MS=${MEMEPERP_BATCH_INTERVAL_MS:-30000}
      - SKIP_SIGNATURE_VERIFY=${SKIP_SIGNATURE_VERIFY:-false}
      - REDIS_URL=redis://:${MEMEPERP_REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8081/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 3

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memeperp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MEMEPERP_DATABASE_HOST=postgres
      - MEMEPERP_DATABASE_PORT=5432
      - MEMEPERP_DATABASE_USER=${MEMEPERP_DATABASE_USER:-postgres}
      - MEMEPERP_DATABASE_PASSWORD=${MEMEPERP_DATABASE_PASSWORD:?MEMEPERP_DATABASE_PASSWORD is required}
      - MEMEPERP_DATABASE_DBNAME=${MEMEPERP_DATABASE_DBNAME:-memeperp}
      - MEMEPERP_REDIS_ADDR=redis:6379
      - MEMEPERP_REDIS_PASSWORD=${MEMEPERP_REDIS_PASSWORD:?MEMEPERP_REDIS_PASSWORD is required}
      - MEMEPERP_JWT_SECRET=${MEMEPERP_JWT_SECRET:?MEMEPERP_JWT_SECRET is required (min 32 chars)}
      - MEMEPERP_BLOCKCHAIN_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}
      - MEMEPERP_BLOCKCHAIN_CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:-84532}
      - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY=${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY:-}
      - MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
      - MEMEPERP_MATCHING_ENGINE_URL=${MEMEPERP_MATCHING_ENGINE_URL:-http://matching-engine:8081}
      - MEMEPERP_SERVER_MODE=${MEMEPERP_SERVER_MODE:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 3

  # Frontend Next.js App
  # NOTE: NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
  # The 'args' section below ensures correct values during 'docker-compose build'.
  # The 'environment' section only affects server-side rendering, NOT client-side code.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MATCHING_ENGINE_URL=${NEXT_PUBLIC_MATCHING_ENGINE_URL:-http://localhost:8081}
        - NEXT_PUBLIC_TOKEN_FACTORY_ADDRESS=${MEMEPERP_TOKEN_FACTORY_ADDRESS:-0x757eF02C2233b8cE2161EE65Fb7D626776b8CB73}
        - NEXT_PUBLIC_SETTLEMENT_ADDRESS=${MEMEPERP_SETTLEMENT_ADDRESS:-0x1660b3571fB04f16F70aea40ac0E908607061DBE}
        - NEXT_PUBLIC_SETTLEMENT_V2_ADDRESS=${MEMEPERP_SETTLEMENT_V2_ADDRESS:-0x733EccCf612F70621c772D63334Cf5606d7a7C75}
        - NEXT_PUBLIC_VAULT_ADDRESS=${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS:-0xcc4Fa8Df0686824F92d392Cb650057EA7D2EF46E}
        - NEXT_PUBLIC_PRICE_FEED_ADDRESS=${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS:-0xfB347BC4Cc61C7FdCD862ED212A0e3866d205112}
        - NEXT_PUBLIC_PERP_VAULT_ADDRESS=${MEMEPERP_PERP_VAULT_ADDRESS:-0x586FB78b8dB39d8D89C1Fd2Aa0c756C828e5251F}
        - NEXT_PUBLIC_CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:-84532}
        - NEXT_PUBLIC_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}
        - NEXT_PUBLIC_BASE_TESTNET_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}
    container_name: memeperp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MATCHING_ENGINE_URL=${NEXT_PUBLIC_MATCHING_ENGINE_URL:-http://localhost:8081}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - NEXT_PUBLIC_WS_PUBLIC_URL=${NEXT_PUBLIC_WS_PUBLIC_URL:-ws://localhost:8080/ws/public}
      - NEXT_PUBLIC_WS_PRIVATE_URL=${NEXT_PUBLIC_WS_PRIVATE_URL:-ws://localhost:8080/ws/private}
      - NEXT_PUBLIC_CHAIN_ID=${NEXT_PUBLIC_CHAIN_ID:-84532}
      - NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-https://base-sepolia-rpc.publicnode.com}
      - NEXT_PUBLIC_SETTLEMENT_ADDRESS=${NEXT_PUBLIC_SETTLEMENT_ADDRESS:-0x1660b3571fB04f16F70aea40ac0E908607061DBE}
    depends_on:
      backend:
        condition: service_healthy

  # Keeper Service (Liquidation, Funding Rate, Order)
  keeper:
    build:
      context: ./backend
      dockerfile: Dockerfile.keeper
    container_name: memeperp-keeper
    restart: unless-stopped
    environment:
      - MEMEPERP_DATABASE_HOST=postgres
      - MEMEPERP_DATABASE_PORT=5432
      - MEMEPERP_DATABASE_USER=${MEMEPERP_DATABASE_USER:-postgres}
      - MEMEPERP_DATABASE_PASSWORD=${MEMEPERP_DATABASE_PASSWORD:?MEMEPERP_DATABASE_PASSWORD is required}
      - MEMEPERP_DATABASE_DBNAME=${MEMEPERP_DATABASE_DBNAME:-memeperp}
      - MEMEPERP_REDIS_ADDR=redis:6379
      - MEMEPERP_REDIS_PASSWORD=${MEMEPERP_REDIS_PASSWORD:?MEMEPERP_REDIS_PASSWORD is required}
      - MEMEPERP_BLOCKCHAIN_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}
      - MEMEPERP_BLOCKCHAIN_CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:-84532}
      - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY=${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY:?MEMEPERP_BLOCKCHAIN_PRIVATE_KEY is required}
      - MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS=${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS:-}
      - MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
      - MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS=${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS:-}
      - MEMEPERP_MATCHING_ENGINE_URL=${MEMEPERP_MATCHING_ENGINE_URL:-http://matching-engine:8081}
      - MEMEPERP_SERVER_MODE=debug
      - HEALTH_PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: memeperp-network
