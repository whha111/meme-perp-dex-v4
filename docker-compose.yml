services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: memeperp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MEMEPERP_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${MEMEPERP_DATABASE_PASSWORD:?MEMEPERP_DATABASE_PASSWORD is required}
      POSTGRES_DB: ${MEMEPERP_DATABASE_DBNAME:-memeperp}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEMEPERP_DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache — AUDIT-FIX DP-C03: require password authentication
  redis:
    image: redis:7-alpine
    container_name: memeperp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${MEMEPERP_REDIS_PASSWORD:?MEMEPERP_REDIS_PASSWORD is required} --appendonly yes
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MEMEPERP_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Matching Engine (TypeScript Service)
  matching-engine:
    build:
      context: ./backend/src
      dockerfile: matching/Dockerfile
    container_name: memeperp-matching-engine
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:?MEMEPERP_BLOCKCHAIN_RPC_URL is required}
      - MATCHER_PRIVATE_KEY=${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY:?MEMEPERP_BLOCKCHAIN_PRIVATE_KEY is required}
      - SETTLEMENT_ADDRESS=${MEMEPERP_SETTLEMENT_ADDRESS:?MEMEPERP_SETTLEMENT_ADDRESS is required}
      - TOKEN_FACTORY_ADDRESS=${MEMEPERP_TOKEN_FACTORY_ADDRESS:?MEMEPERP_TOKEN_FACTORY_ADDRESS is required}
      - PRICE_FEED_ADDRESS=${MEMEPERP_PRICE_FEED_ADDRESS:?MEMEPERP_PRICE_FEED_ADDRESS is required}
      - SETTLEMENT_V2_ADDRESS=${MEMEPERP_SETTLEMENT_V2_ADDRESS:?MEMEPERP_SETTLEMENT_V2_ADDRESS is required}
      - PERP_VAULT_ADDRESS=${MEMEPERP_PERP_VAULT_ADDRESS:?MEMEPERP_PERP_VAULT_ADDRESS is required}
      - COLLATERAL_TOKEN_ADDRESS=${COLLATERAL_TOKEN_ADDRESS:?COLLATERAL_TOKEN_ADDRESS is required}
      - INSURANCE_FUND_ADDRESS=${MEMEPERP_INSURANCE_FUND_ADDRESS:?MEMEPERP_INSURANCE_FUND_ADDRESS is required}
      - VAULT_ADDRESS=${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS:?MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS is required}
      - POSITION_MANAGER_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
      - FUNDING_RATE_ADDRESS=${MEMEPERP_FUNDING_RATE_ADDRESS:?MEMEPERP_FUNDING_RATE_ADDRESS is required}
      - LIQUIDATION_ADDRESS=${MEMEPERP_LIQUIDATION_ADDRESS:?MEMEPERP_LIQUIDATION_ADDRESS is required}
      - LENDING_POOL_ADDRESS=${MEMEPERP_LENDING_POOL_ADDRESS:?MEMEPERP_LENDING_POOL_ADDRESS is required}
      - FEE_RECEIVER_ADDRESS=${FEE_RECEIVER_ADDRESS:?FEE_RECEIVER_ADDRESS is required}
      - INTERNAL_API_KEY=${MEMEPERP_INTERNAL_API_KEY:-memeperp-internal-2026}
      - BATCH_INTERVAL_MS=${MEMEPERP_BATCH_INTERVAL_MS:-30000}
      - SKIP_SIGNATURE_VERIFY=${SKIP_SIGNATURE_VERIFY:-false}
      - ALLOW_FAKE_DEPOSIT=${ALLOW_FAKE_DEPOSIT:-false}
      - NODE_ENV=${NODE_ENV:-production}
      - SPOT_PRICE_SYNC_INTERVAL_MS=${SPOT_PRICE_SYNC_INTERVAL_MS:-3000}
      - CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:?MEMEPERP_BLOCKCHAIN_CHAIN_ID is required}
      - REDIS_URL=redis://:${MEMEPERP_REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=postgresql://${MEMEPERP_DATABASE_USER:-postgres}:${MEMEPERP_DATABASE_PASSWORD}@postgres:5432/${MEMEPERP_DATABASE_DBNAME:-memeperp}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8081/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memeperp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MEMEPERP_DATABASE_HOST=postgres
      - MEMEPERP_DATABASE_PORT=5432
      - MEMEPERP_DATABASE_USER=${MEMEPERP_DATABASE_USER:-postgres}
      - MEMEPERP_DATABASE_PASSWORD=${MEMEPERP_DATABASE_PASSWORD:?MEMEPERP_DATABASE_PASSWORD is required}
      - MEMEPERP_DATABASE_DBNAME=${MEMEPERP_DATABASE_DBNAME:-memeperp}
      - MEMEPERP_REDIS_ADDR=redis:6379
      - MEMEPERP_REDIS_PASSWORD=${MEMEPERP_REDIS_PASSWORD:?MEMEPERP_REDIS_PASSWORD is required}
      - MEMEPERP_JWT_SECRET=${MEMEPERP_JWT_SECRET:?MEMEPERP_JWT_SECRET is required (min 32 chars)}
      - MEMEPERP_BLOCKCHAIN_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:?MEMEPERP_BLOCKCHAIN_RPC_URL is required}
      - MEMEPERP_BLOCKCHAIN_CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:?MEMEPERP_BLOCKCHAIN_CHAIN_ID is required}
      - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY=${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY:-}
      - MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
      - MEMEPERP_MATCHING_ENGINE_URL=${MEMEPERP_MATCHING_ENGINE_URL:-http://matching-engine:8081}
      - MEMEPERP_SERVER_MODE=${MEMEPERP_SERVER_MODE:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 3

  # Frontend Next.js App
  # NOTE: NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
  # The 'args' section below ensures correct values during 'docker-compose build'.
  # The 'environment' section only affects server-side rendering, NOT client-side code.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MATCHING_ENGINE_URL=${NEXT_PUBLIC_MATCHING_ENGINE_URL:-}
        - NEXT_PUBLIC_TOKEN_FACTORY_ADDRESS=${MEMEPERP_TOKEN_FACTORY_ADDRESS:?MEMEPERP_TOKEN_FACTORY_ADDRESS is required}
        - NEXT_PUBLIC_SETTLEMENT_ADDRESS=${MEMEPERP_SETTLEMENT_ADDRESS:?MEMEPERP_SETTLEMENT_ADDRESS is required}
        - NEXT_PUBLIC_SETTLEMENT_V2_ADDRESS=${MEMEPERP_SETTLEMENT_V2_ADDRESS:?MEMEPERP_SETTLEMENT_V2_ADDRESS is required}
        - NEXT_PUBLIC_VAULT_ADDRESS=${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS:?MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS is required}
        - NEXT_PUBLIC_PRICE_FEED_ADDRESS=${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS:?MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS is required}
        - NEXT_PUBLIC_PERP_VAULT_ADDRESS=${MEMEPERP_PERP_VAULT_ADDRESS:?MEMEPERP_PERP_VAULT_ADDRESS is required}
        - NEXT_PUBLIC_CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:?MEMEPERP_BLOCKCHAIN_CHAIN_ID is required}
        - NEXT_PUBLIC_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:?MEMEPERP_BLOCKCHAIN_RPC_URL is required}
        - NEXT_PUBLIC_BSC_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:?MEMEPERP_BLOCKCHAIN_RPC_URL is required}
        - NEXT_PUBLIC_WETH_ADDRESS=${COLLATERAL_TOKEN_ADDRESS:?COLLATERAL_TOKEN_ADDRESS is required}
        - NEXT_PUBLIC_POSITION_MANAGER_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
        - NEXT_PUBLIC_LIQUIDATION_ADDRESS=${MEMEPERP_LIQUIDATION_ADDRESS:-}
        - NEXT_PUBLIC_FUNDING_RATE_ADDRESS=${MEMEPERP_FUNDING_RATE_ADDRESS:-}
        - NEXT_PUBLIC_INSURANCE_FUND_ADDRESS=${MEMEPERP_INSURANCE_FUND_ADDRESS:-}
        - NEXT_PUBLIC_RISK_MANAGER_ADDRESS=${MEMEPERP_RISK_MANAGER_ADDRESS:-}
        - NEXT_PUBLIC_CONTRACT_REGISTRY_ADDRESS=${MEMEPERP_CONTRACT_REGISTRY_ADDRESS:-}
        - NEXT_PUBLIC_ROUTER_ADDRESS=${MEMEPERP_ROUTER_ADDRESS:-}
    container_name: memeperp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MATCHING_ENGINE_URL=${NEXT_PUBLIC_MATCHING_ENGINE_URL:-}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_WS_PUBLIC_URL=${NEXT_PUBLIC_WS_PUBLIC_URL:-}
      - NEXT_PUBLIC_WS_PRIVATE_URL=${NEXT_PUBLIC_WS_PRIVATE_URL:-}
      - NEXT_PUBLIC_CHAIN_ID=${NEXT_PUBLIC_CHAIN_ID:?NEXT_PUBLIC_CHAIN_ID is required}
      - NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:?NEXT_PUBLIC_RPC_URL is required}
      - NEXT_PUBLIC_SETTLEMENT_ADDRESS=${NEXT_PUBLIC_SETTLEMENT_ADDRESS:?NEXT_PUBLIC_SETTLEMENT_ADDRESS is required}
      - PINATA_JWT=${PINATA_JWT:-}
    depends_on:
      backend:
        condition: service_healthy

  # Keeper Service (Liquidation, Funding Rate, Order)
  keeper:
    build:
      context: ./backend
      dockerfile: Dockerfile.keeper
    container_name: memeperp-keeper
    restart: unless-stopped
    environment:
      - MEMEPERP_DATABASE_HOST=postgres
      - MEMEPERP_DATABASE_PORT=5432
      - MEMEPERP_DATABASE_USER=${MEMEPERP_DATABASE_USER:-postgres}
      - MEMEPERP_DATABASE_PASSWORD=${MEMEPERP_DATABASE_PASSWORD:?MEMEPERP_DATABASE_PASSWORD is required}
      - MEMEPERP_DATABASE_DBNAME=${MEMEPERP_DATABASE_DBNAME:-memeperp}
      - MEMEPERP_REDIS_ADDR=redis:6379
      - MEMEPERP_REDIS_PASSWORD=${MEMEPERP_REDIS_PASSWORD:?MEMEPERP_REDIS_PASSWORD is required}
      - MEMEPERP_BLOCKCHAIN_RPC_URL=${MEMEPERP_BLOCKCHAIN_RPC_URL:?MEMEPERP_BLOCKCHAIN_RPC_URL is required}
      - MEMEPERP_BLOCKCHAIN_CHAIN_ID=${MEMEPERP_BLOCKCHAIN_CHAIN_ID:?MEMEPERP_BLOCKCHAIN_CHAIN_ID is required}
      - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY=${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY:?MEMEPERP_BLOCKCHAIN_PRIVATE_KEY is required}
      - MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS=${MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS:-}
      - MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS=${MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS:?MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS is required}
      - MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS=${MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS:-}
      - MEMEPERP_MATCHING_ENGINE_URL=${MEMEPERP_MATCHING_ENGINE_URL:-http://matching-engine:8081}
      - MEMEPERP_SERVER_MODE=debug
      - MEMEPERP_INTERNAL_API_KEY=${MEMEPERP_INTERNAL_API_KEY:-memeperp-internal-2026}
      - HEALTH_PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (ngrok 穿透入口)
  nginx:
    image: nginx:alpine
    container_name: memeperp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - matching-engine
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: memeperp-network
