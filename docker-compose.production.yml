version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.production.yml up -d
#
# Required environment variables (set in .env.production):
# - POSTGRES_PASSWORD
# - REDIS_PASSWORD
# - JWT_SECRET
# - KEEPER_PRIVATE_KEY
# - RPC_URL
# - All contract addresses

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dexi-postgres
    restart: always
    environment:
      POSTGRES_USER: memeperp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: memeperp
    ports:
      - "127.0.0.1:5432:5432"  # Only expose locally
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memeperp"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dexi-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"  # Only expose locally
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dexi-backend
    restart: always
    ports:
      - "127.0.0.1:8080:8080"  # Only expose locally, use nginx/traefik for public
    environment:
      - APP_ENV=production
      - MEMEPERP_SERVER_MODE=release
      - MEMEPERP_DATABASE_HOST=postgres
      - MEMEPERP_DATABASE_PORT=5432
      - MEMEPERP_DATABASE_USER=memeperp
      - MEMEPERP_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - MEMEPERP_DATABASE_DBNAME=memeperp
      - MEMEPERP_DATABASE_SSLMODE=disable
      - MEMEPERP_REDIS_ADDR=redis:6379
      - MEMEPERP_REDIS_PASSWORD=${REDIS_PASSWORD}
      - MEMEPERP_JWT_SECRET=${JWT_SECRET}
      # Blockchain configuration ‚Äî Go ÂêéÁ´ØÁî®Áã¨Á´ã RPC ËäÇÁÇπ
      - MEMEPERP_BLOCKCHAIN_RPC_URL=${RPC_URL_BACKEND:-${RPC_URL}}
      - MEMEPERP_BLOCKCHAIN_CHAIN_ID=${CHAIN_ID:-97}
      - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY=${KEEPER_PRIVATE_KEY}
      - MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS=${VAULT_ADDRESS}
      - MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS=${POSITION_ADDRESS}
      - MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS=${PRICE_FEED_ADDRESS}
      - MEMEPERP_LIQUIDATION_ADDRESS=${LIQUIDATION_ADDRESS}
      - MEMEPERP_FUNDING_RATE_ADDRESS=${FUNDING_RATE_ADDRESS}
      - MEMEPERP_LENDING_POOL_ADDRESS=${LENDING_POOL_ADDRESS}
      - MEMEPERP_SETTLEMENT_ADDRESS=${SETTLEMENT_V2_ADDRESS}
      - MEMEPERP_SETTLEMENT_V2_ADDRESS=${SETTLEMENT_V2_ADDRESS}
      - MEMEPERP_INSURANCE_FUND_ADDRESS=${INSURANCE_FUND_ADDRESS}
      - MEMEPERP_PERP_VAULT_ADDRESS=${PERP_VAULT_ADDRESS}
      - MEMEPERP_RISK_MANAGER_ADDRESS=0x19C763600D8cD61CCF85Ff8d00D4D5e06914F12c
      - MEMEPERP_CONTRACT_REGISTRY_ADDRESS=0x0C6605b820084e43d0708943d15b1c681f2bCac1
      - MEMEPERP_TOKEN_FACTORY_ADDRESS=${TOKEN_FACTORY_ADDRESS}
      # Matching Engine
      - MEMEPERP_MATCHING_ENGINE_URL=http://matching-engine:8081
      - MEMEPERP_INTERNAL_API_KEY=${INTERNAL_API_KEY:-memeperp_internal_key_2026}
      # Security ‚Äî production allowed origins
      - MEMEPERP_SECURITY_ALLOWED_ORIGINS=http://dexi.fun,https://dexi.fun,http://23.27.201.207,http://23.27.201.207:3000
      - MEMEPERP_LOG_LEVEL=info
      - MEMEPERP_LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Keeper Service (Liquidation, Funding Rate, Order)
  keeper:
    build:
      context: ./backend
      dockerfile: Dockerfile.keeper
    container_name: dexi-keeper
    restart: always
    environment:
      - APP_ENV=production
      - MEMEPERP_SERVER_MODE=release
      - MEMEPERP_DATABASE_HOST=postgres
      - MEMEPERP_DATABASE_PORT=5432
      - MEMEPERP_DATABASE_USER=memeperp
      - MEMEPERP_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - MEMEPERP_DATABASE_DBNAME=memeperp
      - MEMEPERP_DATABASE_SSLMODE=disable
      - MEMEPERP_REDIS_ADDR=redis:6379
      - MEMEPERP_REDIS_PASSWORD=${REDIS_PASSWORD}
      - MEMEPERP_JWT_SECRET=${JWT_SECRET}
      # Blockchain configuration ‚Äî Keeper Áî®Áã¨Á´ã RPC ËäÇÁÇπ
      - MEMEPERP_BLOCKCHAIN_RPC_URL=${RPC_URL_KEEPER:-${RPC_URL}}
      - MEMEPERP_BLOCKCHAIN_CHAIN_ID=${CHAIN_ID:-97}
      - MEMEPERP_BLOCKCHAIN_PRIVATE_KEY=${KEEPER_PRIVATE_KEY}
      # Contract addresses
      - MEMEPERP_BLOCKCHAIN_VAULT_ADDRESS=${VAULT_ADDRESS}
      - MEMEPERP_BLOCKCHAIN_POSITION_ADDRESS=${POSITION_ADDRESS}
      - MEMEPERP_BLOCKCHAIN_LIQUIDATION_ADDRESS=${LIQUIDATION_ADDRESS}
      - MEMEPERP_FUNDING_RATE_ADDRESS=${FUNDING_RATE_ADDRESS}
      - MEMEPERP_BLOCKCHAIN_PRICE_FEED_ADDRESS=${PRICE_FEED_ADDRESS}
      - MEMEPERP_MATCHING_ENGINE_URL=http://matching-engine:8081
      - MEMEPERP_INTERNAL_API_KEY=${INTERNAL_API_KEY:-memeperp_internal_key_2026}
      # Security ‚Äî production allowed origins
      - MEMEPERP_SECURITY_ALLOWED_ORIGINS=http://dexi.fun,https://dexi.fun,http://23.27.201.207
      - MEMEPERP_LOG_LEVEL=info
      - MEMEPERP_LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Matching Engine (TypeScript Service)
  matching-engine:
    build:
      context: ./backend/src
      dockerfile: matching/Dockerfile
    container_name: dexi-matching-engine
    restart: always
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - PORT=8081
      - CHAIN_ID=${CHAIN_ID:-97}
      # ÊíÆÂêàÂºïÊìéÁî®Áã¨Á´ã RPC ËäÇÁÇπ + Â§ö fallback
      - RPC_URL=${RPC_URL_MATCHING_ENGINE:-${RPC_URL}}
      - RPC_URL_FALLBACK_1=${RPC_URL_MATCHING_ENGINE_FALLBACK_1:-https://bsc-testnet.drpc.org}
      - RPC_URL_FALLBACK_2=${RPC_URL_MATCHING_ENGINE_FALLBACK_2:-https://bsc-testnet-rpc.publicnode.com}
      - RPC_URL_FALLBACK_3=${RPC_URL_MATCHING_ENGINE_FALLBACK_3:-https://data-seed-prebsc-1-s1.bnbchain.org:8545}
      - MATCHER_PRIVATE_KEY=${KEEPER_PRIVATE_KEY}
      - SETTLEMENT_ADDRESS=${POSITION_ADDRESS}
      - TOKEN_FACTORY_ADDRESS=${TOKEN_FACTORY_ADDRESS}
      - PRICE_FEED_ADDRESS=${PRICE_FEED_ADDRESS}
      - SETTLEMENT_V2_ADDRESS=${SETTLEMENT_V2_ADDRESS}
      - PERP_VAULT_ADDRESS=${PERP_VAULT_ADDRESS}
      - COLLATERAL_TOKEN_ADDRESS=${COLLATERAL_TOKEN_ADDRESS}
      - INSURANCE_FUND_ADDRESS=${INSURANCE_FUND_ADDRESS}
      - VAULT_ADDRESS=${VAULT_ADDRESS}
      - POSITION_MANAGER_ADDRESS=${POSITION_ADDRESS}
      - FUNDING_RATE_ADDRESS=${FUNDING_RATE_ADDRESS}
      - LIQUIDATION_ADDRESS=${LIQUIDATION_ADDRESS}
      - FEE_RECEIVER_ADDRESS=${FEE_RECEIVER_ADDRESS}
      - LENDING_POOL_ADDRESS=${LENDING_POOL_ADDRESS}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://memeperp:${POSTGRES_PASSWORD}@postgres:5432/memeperp
      - PLATFORM_SIGNER_KEY=${PLATFORM_SIGNER_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-memeperp_internal_key_2026}
      - SKIP_BALANCE_SYNC=${SKIP_BALANCE_SYNC:-true}
      - SNAPSHOT_INTERVAL_MS=${SNAPSHOT_INTERVAL_MS:-300000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8081/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Frontend Next.js App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-https://dexi.fun}
        - NEXT_PUBLIC_WEBSOCKET_URL=${WS_URL:-wss://dexi.fun/ws}
        - NEXT_PUBLIC_CHAIN_ID=${CHAIN_ID:-97}
        # IMPORTANT: This URL is accessed from the USER'S BROWSER, not from Docker.
        # Must use the public-facing nginx URL, NOT Docker internal hostname.
        - NEXT_PUBLIC_MATCHING_ENGINE_URL=${PUBLIC_API_URL:-http://23.27.201.207}
        # Contract addresses (baked into JS bundle at build time)
        - NEXT_PUBLIC_TOKEN_FACTORY_ADDRESS=${TOKEN_FACTORY_ADDRESS:-0xB40541Ff9f24883149fc6F9CD1021dB9C7BCcB83}
        - NEXT_PUBLIC_SETTLEMENT_ADDRESS=${SETTLEMENT_ADDRESS:-0x32de01f0E464521583E52d50f125492D10EfDBB3}
        - NEXT_PUBLIC_SETTLEMENT_V2_ADDRESS=${SETTLEMENT_V2_ADDRESS:-0xF83D5d2E437D0e27144900cb768d2B5933EF3d6b}
        - NEXT_PUBLIC_VAULT_ADDRESS=${VAULT_ADDRESS:-0x7a88347Be6A9f290a55dcAd8592163E545F05e2a}
        - NEXT_PUBLIC_PRICE_FEED_ADDRESS=${PRICE_FEED_ADDRESS:-0xB480517B96558E4467cfa1d91d8E6592c66B564D}
        - NEXT_PUBLIC_PERP_VAULT_ADDRESS=${PERP_VAULT_ADDRESS:-0xF0db95eD967318BC7757A671399f0D4FFC853e05}
        - NEXT_PUBLIC_POSITION_MANAGER_ADDRESS=${POSITION_ADDRESS:-0x50d3e039Efe373D9d52676D482E732FD9C411b05}
        - NEXT_PUBLIC_LIQUIDATION_ADDRESS=${LIQUIDATION_ADDRESS:-0x5B829938d245896CAb443e30f1502aBF54312265}
        - NEXT_PUBLIC_FUNDING_RATE_ADDRESS=${FUNDING_RATE_ADDRESS:-0x3A136b4Fbc8E4145F31D9586Ae9abDe9f47c7B83}
        - NEXT_PUBLIC_INSURANCE_FUND_ADDRESS=${INSURANCE_FUND_ADDRESS:-0xa20488Ed2CEABD0e6441496c2F4F5fBA18F4cE83}
        - NEXT_PUBLIC_RISK_MANAGER_ADDRESS=0x19C763600D8cD61CCF85Ff8d00D4D5e06914F12c
        - NEXT_PUBLIC_CONTRACT_REGISTRY_ADDRESS=0x0C6605b820084e43d0708943d15b1c681f2bCac1
        - NEXT_PUBLIC_WETH_ADDRESS=0xae13d989daC2f0dEbFf460aC112a837C89BAa7cd
        - NEXT_PUBLIC_ROUTER_ADDRESS=0xD99D1c33F9fC3444f8101754aBC46c52416550D1
        - NEXT_PUBLIC_RPC_URL=${RPC_URL_FRONTEND:-${RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545/}}
        - NEXT_PUBLIC_BSC_RPC_URL=${RPC_URL_FRONTEND:-${RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545/}}
        - NEXT_PUBLIC_BSC_TESTNET_RPC_URL=${RPC_URL_FRONTEND:-${RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545/}}
    container_name: dexi-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"  # Only expose locally, use nginx/traefik
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Nginx Reverse Proxy (optional, can use external load balancer)
  nginx:
    image: nginx:alpine
    container_name: dexi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: dexi-network
